name = "storytime-app"
type = "service"
main = "src/worker.js"
compatibility_date = "2024-01-01"

[env.production]
name = "storytime-app-prod"
routes = [
  { pattern = "storytime.pages.dev/*", zone_name = "pages.dev" }
]

[[env.production.vars]]
NODE_ENV = "production"

[[env.production.kv_namespaces]]
binding = "AUDIO_CACHE"
id = "your_kv_namespace_id"
preview_id = "your_kv_preview_id"

[build]
command = "npm run build"
cwd = "./"
watch_paths = ["backend/**/*.js", "frontend/dist/**"]

[build.upload]
format = "service-worker"

[env.production.build]
command = "cd frontend && npm install && npm run build && cd ../backend && npm install"
