name = "storytime-app"
main = "frontend/dist/index.html"
compatibility_date = "2024-01-01"

[env.production]
routes = [
  { pattern = "storytime-app.pages.dev", zone_name = "pages.dev" }
]

[build]
command = "cd frontend && npm install && npm run build"
cwd = "."
watch_paths = ["frontend/src/**/*.jsx", "frontend/src/**/*.js"]

[[build.upload]]
format = "service-worker"

[build.upload.rules]
type = "CompiledContentType"
globs = ["**/*.wasm"]
fallthrough = true

[pages]
build_output_dir = "frontend/dist"
