name = "storytime-app"
main = "src/worker.js"
compatibility_date = "2024-12-19"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages configuration
pages_build_output_dir = "frontend/dist"

[env.production]
name = "storytime-app-prod"
route = "storytime-app.pages.dev/*"

[env.production.kv_namespaces]
binding = "AUDIO_CACHE"
id = ""
preview_id = ""

# Environment variables
[env.production.vars]
NODE_ENV = "production"
API_BASE_URL = "https://storytime-app-api.onrender.com"

# Secrets (set via: wrangler secret put GROQ_API_KEY --env production)
# GROQ_API_KEY
# MONGODB_URI

[build]
command = "cd frontend && npm install && npm run build"
cwd = "./"
watch_paths = ["backend/**/*", "frontend/src/**/*"]

[build.upload]
format = "modules"
main = "./src/worker.js"

# Limits
limits = { cpu_ms = 50000 }

# Routes
[[routes]]
pattern = "example.com/*"
zone_name = "example.com"
