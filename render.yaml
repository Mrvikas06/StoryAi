services:
  - type: web
    name: storytime-app
    runtime: node
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npm run build
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
