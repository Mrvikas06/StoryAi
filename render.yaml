services:
  - type: web
    name: storyai-api
    runtime: node
    buildCommand: npm install && cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false

    # Health check
    healthCheckPath: /api/health
    healthCheckInterval: 30

    # Auto-deploy from GitHub
    autoDeploy: true
